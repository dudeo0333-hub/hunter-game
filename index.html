<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헌터 게이트</title>
<style>
body{font-family:sans-serif;text-align:center;background:#111;color:#fff}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<h2 id="title">헌터 게이트 RPG</h2>

<p>크리스탈: <span id="c">1000</span></p>
<p>골드: <span id="g">0</span></p>

<button onclick="summon()">캐릭터 뽑기(100)</button>
<button onclick="battle()">전투</button>

<script>
let c=1000,g=0,tap=0,timer;

function summon(){
 if(c>=100){c-=100;update();alert("캐릭터 획득!")}
 else alert("크리스탈 부족")
}

function battle(){
 let r=Math.random();
 if(r<0.5){g+=100;alert("승리 +100골드")}
 else alert("패배")
 update();
}

function update(){
 document.getElementById("c").innerText=c;
 document.getElementById("g").innerText=g;
}

// 숨겨진 치트 (타이틀 5번 클릭)
document.getElementById("title").onclick=()=>{
 tap++;
 clearTimeout(timer);
 timer=setTimeout(()=>tap=0,1200);
 if(tap>=5){
   c+=9999;
   g+=9999;
   update();
   alert("치트 활성화🔥");
   tap=0;
 }
}
</script>

</body>
</html>
